# Build + deploy to Azure Container Apps via federated OIDC (no long-lived secrets).
# Generated by pike-azure-infra. Tuned for the single-app profile; for dual-app,
# duplicate the build + deploy steps for the second image/app.
#
# Required GitHub repository SECRETS:
#   AZURE_CLIENT_ID        — app registration with a federated credential for this repo
#   AZURE_TENANT_ID        — Entra tenant id
#   AZURE_SUBSCRIPTION_ID  — target subscription
# Required GitHub repository VARIABLES:
#   AZURE_RESOURCE_GROUP   — e.g. {{APP_NAME}}-{{ENVIRONMENT}}-rg
#   ACR_NAME               — e.g. {{ACR_NAME}}
#   CONTAINER_APP_NAME     — e.g. {{APP_NAME}}-{{ENVIRONMENT}}-app
#
# App secrets (DATABASE_URL, AUTH_SECRET, App Insights, …) live as Container App
# `secretref:` values created by Bicep — never as GitHub secrets.

name: Deploy

on:
  # Enable push-to-deploy once OIDC federation is provisioned:
  #   push: { branches: [main] }
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log into ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push image
        run: |
          set -euo pipefail
          IMAGE="${{ vars.ACR_NAME }}.azurecr.io/${{ vars.CONTAINER_APP_NAME }}:${IMAGE_TAG}"
          docker build -t "$IMAGE" -t "${{ vars.ACR_NAME }}.azurecr.io/${{ vars.CONTAINER_APP_NAME }}:latest" .
          docker push "$IMAGE"
          docker push "${{ vars.ACR_NAME }}.azurecr.io/${{ vars.CONTAINER_APP_NAME }}:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # If this app has a migrate job, run it against the new image before deploy:
      # - name: Run migrations
      #   run: |
      #     set -euo pipefail
      #     JOB="${{ vars.CONTAINER_APP_NAME }}"; JOB="${JOB%-app}-migrate-job"
      #     az containerapp job update -n "$JOB" -g "${{ vars.AZURE_RESOURCE_GROUP }}" --image "$IMAGE"
      #     EXEC=$(az containerapp job start -n "$JOB" -g "${{ vars.AZURE_RESOURCE_GROUP }}" --query name -o tsv)
      #     for _ in $(seq 1 60); do sleep 10;
      #       S=$(az containerapp job execution show -n "$JOB" -g "${{ vars.AZURE_RESOURCE_GROUP }}" --job-execution-name "$EXEC" --query properties.status -o tsv);
      #       echo "Status: $S"; [ "$S" = Succeeded ] && exit 0; [ "$S" = Failed ] && exit 1; done
      #     echo "Migration timed out"; exit 1

      - name: Deploy to Container Apps
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE"

      - name: Show deployed revision
        run: |
          az containerapp revision list \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "[?properties.active].{name:name, image:properties.template.containers[0].image}" \
            -o table
